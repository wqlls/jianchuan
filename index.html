<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>简传记</title>
    <style>
        /* ===== 完整样式（与之前一致） ===== */
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
        :root{--bg:#ededed;--top-bar-bg:#fff;--bottom-bar-bg:#f7f7f7;--primary:#7EB8E0;--primary-dark:#5a9bc7;--text-primary:#1a1a1a;--text-secondary:#666;--border:#d9d9d9;--radius:12px;--msg-other-bg:#fff;--msg-self-bg:#95ec69;--safe-bottom:env(safe-area-inset-bottom,0px)}
        .theme-night{--bg:#1a1a2e;--top-bar-bg:#16213e;--bottom-bar-bg:#16213e;--text-primary:#eee;--text-secondary:#aaa;--border:#2a2a4a;--msg-other-bg:#2a2a4a;--msg-self-bg:#2d6a4f}
        .theme-night #chatArea{background:#1a1a2e}
        .theme-night .msg-bubble{color:#eee}
        .theme-night .msg.other .msg-bubble{background:#2a2a4a}
        .theme-night .msg.self .msg-bubble{background:#2d6a4f}
        .theme-night .top-name,.theme-night .top-status{color:#ddd}
        .theme-night .msg-time{color:#888}
        .theme-night #msgInput{background:#2a2a4a;color:#eee;border-color:#3a3a5a}
        .theme-night #msgInput::placeholder{color:#888}
        .theme-night .modal{background:#1a1a2e;color:#eee}
        .theme-night .modal .field label{color:#aaa}
        .theme-night .modal .field input,.theme-night .modal .field textarea{background:#2a2a4a;color:#eee;border-color:#3a3a5a}
        .theme-night .modal .btn-row .btn-cancel{background:#2a2a4a;color:#aaa}
        .theme-night .settings-tabs{background:#2a2a4a}
        .theme-night .settings-tabs button{color:#aaa}
        .theme-night .settings-tabs button.active{color:#fff;border-bottom-color:var(--primary)}
        .theme-night .card-list-item{background:#2a2a4a;border-color:#3a3a5a;color:#ddd}
        .theme-night .calendar-box{background:#1a1a2e;color:#eee}
        .theme-night .calendar-box td:hover{background:#2a2a4a}
        .theme-night #musicOverlay .music-container{background:rgba(26,26,46,0.95);color:#eee}
        .theme-night #musicOverlay .music-extra{color:#aaa}
        .theme-night .session-item{background:#2a2a4a;border-color:#3a3a5a;color:#ddd}
        .theme-night .session-item .info .meta{color:#888}
        .theme-night .draft-item{background:#2a2a4a;border-color:#3a3a5a;color:#ddd}
        .theme-night .letter-item{background:#2a2a4a;border-color:#3a3a5a;color:#ddd}
        .theme-night .letter-item .letter-result{background:#1a2a3a}
        .theme-night .history-item{background:#2a2a4a;border-color:#3a3a5a;color:#ddd}
        .theme-night .liuyao-result{background:#2a2a4a;color:#ddd}
        html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
        #app{display:flex;flex-direction:column;height:100%;width:100%;max-width:480px;margin:0 auto;background:var(--bg);position:relative;overflow:hidden;box-shadow:0 0 20px rgba(0,0,0,0.1);transition:background .3s}
        #topBar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--top-bar-bg);border-bottom:1px solid var(--border);flex-shrink:0;min-height:64px;z-index:10;gap:4px;transition:background .3s,border-color .3s}
        .top-left,.top-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
        .top-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;border:1px solid var(--border);background:#ddd;cursor:pointer;flex-shrink:0}
        .top-status{font-size:9px;color:var(--text-secondary);line-height:1.2;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:color .3s}
        .top-name{font-size:15px;font-weight:600;color:var(--text-primary);cursor:pointer;white-space:nowrap;max-width:70px;overflow:hidden;text-overflow:ellipsis;transition:color .3s}
        .top-daily-status{font-size:10px;color:var(--text-secondary);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.7;margin-top:2px}
        .top-center{display:flex;align-items:center;gap:4px;flex-shrink:0}
        .top-center .icon-btn{font-size:18px;cursor:pointer;padding:4px;border-radius:6px;background:transparent;border:none;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;width:30px;height:30px;transition:color .3s}
        .top-center .icon-btn:hover{background:rgba(0,0,0,0.05)}
        #chatArea{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:6px;background:var(--bg);scroll-behavior:smooth;-webkit-overflow-scrolling:touch;background-size:cover;background-position:center;transition:background .3s;position:relative}
        #chatArea::-webkit-scrollbar{width:3px}
        #chatArea::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
        #chatArea .bg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;transition:background .3s}
        #chatArea .msg,.msg-quote,.msg-time{position:relative;z-index:1}
        .msg{display:flex;flex-direction:column;max-width:85%;animation:fadeIn .25s ease;position:relative}
        .msg.self{align-self:flex-end;align-items:flex-end}
        .msg.other{align-self:flex-start;align-items:flex-start}
        .msg-bubble{padding:10px 14px;border-radius:var(--radius);word-break:break-word;line-height:1.6;font-size:15px;position:relative;box-shadow:0 1px 2px rgba(0,0,0,0.06);max-width:100%;transition:background .3s,color .3s}
        .msg-bubble.img-msg{padding:0!important;background:transparent!important;border-radius:0!important;box-shadow:none!important;overflow:hidden}
        .msg-bubble.img-msg img{display:block;width:100%;height:100%;object-fit:cover;border-radius:6px;max-width:100%;max-height:300px}
        .msg-bubble.img-emoji{aspect-ratio:1/1;max-width:100px;width:100%}
        .msg-bubble.img-album{aspect-ratio:1/2;max-width:120px;max-height:240px;width:100%}
        .msg.self .msg-bubble{background:var(--msg-self-bg);border-bottom-right-radius:4px}
        .msg.other .msg-bubble{background:var(--msg-other-bg);border-bottom-left-radius:4px}
        .msg.self .msg-bubble.img-msg,.msg.other .msg-bubble.img-msg{background:transparent!important;border-radius:0!important}
        .msg-time{font-size:10px;color:var(--text-secondary);margin:2px 6px 0;transition:color .3s}
        .msg.self .msg-time{text-align:right}
        .msg.other .msg-time{text-align:left}
        .msg-quote{font-size:13px;color:var(--text-secondary);background:rgba(0,0,0,0.05);padding:6px 10px;border-radius:6px;margin-bottom:4px;border-left:3px solid var(--primary);max-width:100%;word-break:break-word;transition:background .3s,color .3s,border-color .3s}
        .msg-actions{display:none;gap:4px;margin-top:2px;flex-wrap:wrap}
        .msg:hover .msg-actions,.msg-actions.show{display:flex}
        .msg-actions button{background:transparent;border:none;font-size:12px;color:var(--text-secondary);padding:2px 8px;border-radius:4px;cursor:pointer;background:rgba(0,0,0,0.04)}
        .msg-actions button:hover{background:rgba(0,0,0,0.1)}
        .msg-actions button.danger:hover{color:#e74c3c;background:rgba(231,76,60,0.1)}
        #bottomBar{display:flex;align-items:flex-end;gap:4px;padding:6px 10px;background:var(--bottom-bar-bg);border-top:1px solid var(--border);flex-shrink:0;min-height:56px;padding-bottom:calc(6px + var(--safe-bottom));position:relative;transition:background .3s,border-color .3s}
        #bottomBar .icon-btn{font-size:22px;cursor:pointer;padding:4px;border-radius:6px;background:transparent;border:none;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;width:36px;height:36px;flex-shrink:0;transition:color .3s;position:relative}
        #bottomBar .icon-btn:hover{background:rgba(0,0,0,0.05)}
        #musicMiniIndicator{position:absolute;bottom:62px;right:12px;background:rgba(0,0,0,0.75);color:#fff;border-radius:20px;padding:4px 12px 4px 8px;display:none;align-items:center;gap:6px;font-size:12px;cursor:pointer;z-index:50;backdrop-filter:blur(4px);box-shadow:0 2px 12px rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.15)}
        #musicMiniIndicator.active{display:flex}
        #musicMiniIndicator .mmi-icon{font-size:16px}
        #musicMiniIndicator .mmi-name{max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        #musicMiniIndicator .mmi-close{background:0;border:none;color:rgba(255,255,255,0.6);cursor:pointer;font-size:14px;padding:0 2px}
        #musicMiniIndicator .mmi-close:hover{color:#fff}
        #msgInput{flex:1;min-width:0;padding:8px 14px;border-radius:20px;border:1px solid var(--border);outline:none;font-size:15px;background:#fff;resize:none;overflow:hidden;min-height:38px;max-height:120px;font-family:inherit;line-height:1.5;transition:background .3s,color .3s,border-color .3s}
        #msgInput:focus{border-color:var(--primary)}
        #sendBtn{padding:6px 18px;border-radius:20px;border:none;background:var(--primary);color:#fff;font-size:15px;font-weight:500;cursor:pointer;height:38px;flex-shrink:0;white-space:nowrap;transition:background .3s}
        #sendBtn:hover{background:var(--primary-dark)}
        #sendBtn:active{transform:scale(.95)}
        #moreBtn{font-size:20px;cursor:pointer;padding:0 4px;color:var(--text-secondary);background:0;border:none;display:flex;align-items:center;justify-content:center;height:38px;transition:color .3s}
        #moreBtn:hover{color:var(--primary)}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(2px);padding:20px}
        .modal-overlay.active{display:flex!important}
        .modal{background:#fff;border-radius:16px;max-width:420px;width:100%;padding:24px 22px 28px;box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:modalIn .25s ease;max-height:90vh;overflow-y:auto;transition:background .3s,color .3s}
        @keyframes modalIn{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .modal h3{font-size:18px;margin-bottom:16px;text-align:center;color:var(--text-primary);transition:color .3s}
        .modal .field{margin-bottom:16px}
        .modal .field label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:4px;transition:color .3s}
        .modal .field input,.modal .field textarea,.modal .field select{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;font-family:inherit;background:#fff;transition:background .3s,color .3s,border-color .3s}
        .modal .field input:focus,.modal .field textarea:focus{border-color:var(--primary)}
        .modal .field textarea{resize:vertical;min-height:60px}
        .modal .btn-row{display:flex;gap:10px;margin-top:12px;justify-content:flex-end}
        .modal .btn-row button{padding:8px 20px;border-radius:8px;border:none;font-size:14px;cursor:pointer;transition:background .3s,color .3s}
        .modal .btn-row .btn-cancel{background:#f0f0f0;color:var(--text-secondary)}
        .modal .btn-row .btn-cancel:hover{background:#e0e0e0}
        .modal .btn-row .btn-confirm{background:var(--primary);color:#fff}
        .modal .btn-row .btn-confirm:hover{background:var(--primary-dark)}
        .settings-tabs{display:flex;background:#f5f5f5;border-radius:8px;margin-bottom:12px;overflow:hidden;flex-wrap:wrap;transition:background .3s}
        .settings-tabs button{flex:1;padding:8px 4px;background:0;border:none;font-size:13px;color:#666;cursor:pointer;transition:.2s;border-bottom:2px solid transparent;min-width:50px}
        .settings-tabs button.active{color:#000;border-bottom-color:var(--primary);font-weight:600}
        .settings-subpanel{display:none}
        .settings-subpanel.active{display:block}
        .group-header{display:flex;align-items:center;cursor:pointer;padding:6px 8px;font-weight:600;color:var(--text-primary);user-select:none;gap:6px;background:#f5f7fa;border-radius:6px;margin-top:4px}
        .group-header:hover{background:#e8ecf1}
        .group-header .arrow{display:inline-block;transition:transform .25s;font-size:13px;color:var(--text-secondary)}
        .group-header .arrow.collapsed{transform:rotate(-90deg)}
        .group-header .group-badge{font-size:11px;color:#888;font-weight:400;margin-left:auto;background:#e0e0e0;padding:0 8px;border-radius:10px}
        .group-cards{overflow:hidden;transition:max-height .35s;max-height:999px;padding-left:6px;border-left:2px solid #eee;margin-left:4px}
        .group-cards.collapsed{max-height:0!important;padding:0;border-left:0}
        .card-list-item{display:flex;align-items:center;padding:4px 8px;background:#fff;border-radius:6px;margin-bottom:3px;border:1px solid #eee;gap:6px;transition:background .3s,border-color .3s,color .3s}
        .card-list-item .content{flex:1;word-break:break-word;font-size:13px}
        .card-list-item .group-tag{font-size:10px;color:#888;background:#f0f0f0;padding:0 6px;border-radius:10px}
        .card-list-item .del-btn{background:0;border:none;color:#e74c3c;cursor:pointer;font-size:15px;padding:0 2px}
        .batch-actions{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
        .batch-actions button{padding:4px 12px;border-radius:4px;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:13px;transition:background .3s,color .3s,border-color .3s}
        .batch-actions button.primary{border-color:var(--primary);color:var(--primary)}
        .batch-actions button.danger{border-color:#e74c3c;color:#e74c3c}
        .search-box{display:flex;gap:6px;margin-bottom:8px;align-items:center}
        .search-box input{flex:1;padding:6px 10px;border-radius:6px;border:1px solid var(--border);font-size:13px;outline:none;background:#fff}
        .search-box input:focus{border-color:var(--primary)}
        .search-box .search-icon{font-size:18px;color:var(--text-secondary)}
        .session-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#fff;border-radius:8px;margin-bottom:6px;border:1px solid #eee;cursor:pointer;transition:background .3s,border-color .3s,color .3s}
        .session-item .info{flex:1}
        .session-item .info .name{font-weight:600}
        .session-item .info .meta{font-size:12px;color:#888}
        .session-item .del-session{background:0;border:none;color:#e74c3c;cursor:pointer;font-size:16px}
        #callOverlay{position:fixed;bottom:80px;right:16px;width:180px;height:360px;background:rgba(0,0,0,0.85);border-radius:20px;z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(10px);color:#fff;box-shadow:0 8px 30px rgba(0,0,0,0.5);padding:16px;background-size:cover;background-position:center}
        #callOverlay.active{display:flex}
        #callOverlay .call-avatar{width:60px;height:60px;border-radius:50%;border:3px solid #fff;object-fit:cover;margin-bottom:8px}
        #callOverlay .call-name{font-size:16px;font-weight:600}
        #callOverlay .call-status{font-size:12px;opacity:.8;margin:4px 0 12px}
        #callOverlay .call-timer{font-size:18px;font-weight:300;letter-spacing:2px;margin-bottom:12px}
        #callOverlay .call-btn-group{display:flex;gap:24px}
        #callOverlay .call-btn-group button{background:rgba(255,255,255,0.2);border:none;border-radius:50%;width:44px;height:44px;font-size:20px;color:#fff;cursor:pointer;transition:.2s}
        #callOverlay .call-btn-group button:hover{background:rgba(255,255,255,0.3)}
        #callOverlay .call-btn-group .hangup{background:#e74c3c}
        #callOverlay .call-btn-group .hangup:hover{background:#c0392b}
        #callOverlay .call-minimize-btn{position:absolute;top:8px;right:12px;background:0;border:none;color:#fff;font-size:18px;cursor:pointer}
        #callOverlay .call-bg-btn{position:absolute;bottom:12px;right:12px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;width:32px;height:32px;font-size:16px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
        #callOverlay .call-bg-btn:hover{background:rgba(255,255,255,0.3)}
        #callMini{position:fixed;bottom:80px;right:16px;width:120px;height:60px;background:rgba(0,0,0,0.7);border-radius:30px;z-index:1000;display:none;align-items:center;padding:4px 12px;gap:8px;color:#fff;cursor:pointer;backdrop-filter:blur(4px)}
        #callMini.active{display:flex}
        #callMini .mini-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #fff}
        #callMini .mini-info{flex:1;font-size:12px;overflow:hidden}
        #callMini .mini-info .name{font-weight:600;white-space:nowrap}
        #callMini .mini-info .time{font-size:10px;opacity:.8}
        #callMini .mini-hangup{background:#e74c3c;border:none;border-radius:50%;width:22px;height:22px;color:#fff;font-size:12px;cursor:pointer}
        .calendar-box{background:#fff;border-radius:16px;padding:20px;width:90%;max-width:380px;position:relative;transition:background .3s,color .3s}
        .calendar-box .cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .calendar-box .cal-header button{background:0;border:none;font-size:20px;cursor:pointer;padding:0 8px}
        .calendar-box table{width:100%;border-collapse:collapse;text-align:center}
        .calendar-box td{padding:6px;border-radius:4px;cursor:pointer}
        .calendar-box td:hover{background:#f0f0f0}
        .calendar-box td.marked{background:#ffd1d1;border-radius:50%}
        .calendar-box .period-reminder{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;font-size:14px}
        .calendar-box .period-reminder button{background:var(--primary);color:#fff;border:none;padding:4px 12px;border-radius:12px;cursor:pointer}
        #musicOverlay .music-container{background:rgba(255,255,255,0.95);border-radius:24px;padding:24px;width:90%;max-width:360px;box-shadow:0 10px 40px rgba(0,0,0,0.3);position:relative;transition:background .3s,color .3s}
        #musicOverlay .music-close{position:absolute;top:10px;right:16px;font-size:22px;cursor:pointer;background:0;border:none}
        #musicOverlay .music-minimize{position:absolute;top:10px;right:50px;font-size:18px;cursor:pointer;background:0;border:none}
        #musicOverlay .music-controls{display:flex;justify-content:center;align-items:center;gap:16px;margin:12px 0;flex-wrap:wrap}
        #musicOverlay .music-controls button{background:0;border:none;font-size:28px;cursor:pointer;padding:4px 8px}
        #musicOverlay .music-mode-btn{font-size:18px!important;background:rgba(0,0,0,0.05);border-radius:8px;padding:4px 10px}
        #musicOverlay .music-mode-btn.active{background:var(--primary);color:#fff}
        #musicOverlay .music-extra{margin-top:12px;text-align:center;font-size:14px;color:#555}
        #musicOverlay .music-extra .daily-wisdom{font-style:italic;color:#888;margin-top:6px}
        .chat-settings-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #eee;transition:border-color .3s}
        .chat-settings-row label{font-size:14px}
        .chat-settings-row input[type=number]{width:60px;padding:4px;border:1px solid #ccc;border-radius:4px}
        .chat-settings-row input[type=checkbox]{width:20px;height:20px}
        .chat-settings-row select{padding:4px 8px;border-radius:4px;border:1px solid #ccc;background:#fff}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:10px 24px;border-radius:30px;font-size:14px;z-index:9999;display:none}
        .toast.show{display:block;animation:fadeIn .3s}
        #lockOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;backdrop-filter:blur(8px)}
        #lockOverlay.hidden{display:none}
        #lockOverlay h2{font-size:24px;margin-bottom:20px;font-weight:300;letter-spacing:2px}
        #lockOverlay input{padding:14px 20px;font-size:20px;text-align:center;width:200px;border:none;border-radius:30px;background:rgba(255,255,255,0.15);color:#fff;outline:none;letter-spacing:8px}
        #lockOverlay input::placeholder{color:rgba(255,255,255,0.5);letter-spacing:2px}
        #lockOverlay .lock-btn{margin-top:20px;padding:10px 30px;border-radius:30px;border:none;background:#07c160;color:#fff;font-size:16px;cursor:pointer}
        #lockOverlay .lock-btn:hover{background:#06ad56}
        #lockOverlay .lock-error{color:#ff6b6b;font-size:14px;margin-top:12px;min-height:20px}
        #lockOverlay .lock-hint{font-size:13px;color:#aaa;margin-top:10px}
        .emoji-picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:10px 0}
        .emoji-picker-grid img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:.2s}
        .emoji-picker-grid img:hover{border-color:var(--primary);transform:scale(1.05)}
        .emoji-item{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #eee}
        .emoji-item img{width:36px;height:36px;object-fit:cover;border-radius:4px}
        .emoji-item .del-btn{background:0;border:none;color:#e74c3c;cursor:pointer;font-size:16px}
        .emoji-item .checkbox{margin-right:6px}
        .color-picker-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0}
        .color-picker-row .color-btn{width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:.2s;flex-shrink:0}

        // ---- 密码锁 ----
        (function() {
            const LOCK_KEY = 'app_password';
            const lockOverlay = document.getElementById('lockOverlay');
            const lockInput = document.getElementById('lockInput');
            const lockBtn = document.getElementById('lockBtn');
            const lockError = document.getElementById('lockError');
            const lockHint = document.getElementById('lockHint');
            const app = document.getElementById('app');

            let storedPassword = localStorage.getItem(LOCK_KEY);
            let attempts = 0;

            if (window.location.search.includes('skip=1') || window.location.search.includes('reset=1')) {
                localStorage.removeItem(LOCK_KEY);
                storedPassword = null;
                lockOverlay.classList.add('hidden');
                app.style.display = 'flex';
                if (typeof initApp === 'function') setTimeout(initApp, 100);
                return;
            }

            if (!storedPassword) {
                lockHint.textContent = '首次使用，请设置密码 (4~20位)';
                lockBtn.textContent = '设置密码';
                lockBtn.onclick = function() {
                    const pwd = lockInput.value.trim();
                    if (pwd.length < 4) { lockError.textContent = '密码至少4位'; return; }
                    localStorage.setItem(LOCK_KEY, pwd);
                    storedPassword = pwd;
                    lockError.textContent = '密码已设置';
                    lockHint.textContent = '请重新输入以解锁';
                    lockBtn.textContent = '解锁';
                    lockInput.value = '';
                    lockBtn.onclick = unlock;
                    lockHint.textContent = '请输入密码解锁';
                };
            } else {
                lockHint.textContent = '请输入密码解锁';
                lockBtn.onclick = unlock;
            }

            function unlock() {
                const input = lockInput.value.trim();
                if (input === storedPassword) {
                    lockOverlay.classList.add('hidden');
                    app.style.display = 'flex';
                    if (typeof initApp === 'function') initApp();
                } else {
                    attempts++;
                    lockError.textContent = `密码错误 (尝试 ${attempts})`;
                    lockInput.value = '';
                    lockInput.focus();
                    if (attempts >= 5) {
                        lockError.textContent = '错误次数过多，请稍后再试';
                        lockBtn.disabled = true;
                        setTimeout(() => { lockBtn.disabled = false; attempts = 0; lockError.textContent = ''; }, 30000);
                    }
                }
            }
            lockInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') lockBtn.click(); });

            window.changeAppPassword = function() {
                const old = prompt('请输入当前密码：');
                if (old !== storedPassword) { alert('密码错误'); return; }
                const newPwd = prompt('请输入新密码 (4~20位)：');
                if (newPwd && newPwd.length >= 4) {
                    localStorage.setItem(LOCK_KEY, newPwd);
                    storedPassword = newPwd;
                    alert('密码已修改');
                } else { alert('密码至少4位'); }
            };
            window.disableAppPassword = function() {
                if (confirm('确认关闭密码锁？下次打开将无需密码。')) {
                    localStorage.removeItem(LOCK_KEY);
                    storedPassword = null;
                    alert('密码锁已关闭');
                    location.reload();
                }
            };
        })();

        // ---- IndexedDB 存储 ----
        const DB_NAME = 'JianChuanFinalDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'main';
        let db = null;
        let _cache = {};
        let _cacheReady = false;

        function openDB() {
            return new Promise((resolve, reject) => {
                if (db && db.name === DB_NAME) { resolve(db); return; }
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = function(e) {
                    const d = e.target.result;
                    if (!d.objectStoreNames.contains(STORE_NAME)) {
                        d.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = function(e) {
                    db = e.target.result;
                    resolve(db);
                };
                request.onerror = function(e) {
                    reject(e.target.error);
                };
            });
        }

        async function idbSet(key, value) {
            try {
                const d = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = d.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    const req = store.put(value, key);
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            } catch (e) { console.warn('idbSet error:', e); }
        }

        async function idbGet(key) {
            try {
                const d = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = d.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const req = store.get(key);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            } catch (e) { return undefined; }
        }

        async function idbDelete(key) {
            try {
                const d = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = d.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    const req = store.delete(key);
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            } catch (e) { console.warn('idbDelete error:', e); }
        }

        async function idbKeys() {
            try {
                const d = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = d.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const req = store.getAllKeys();
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            } catch (e) { return []; }
        }

        // ---- 缓存管理 ----
        async function _warmCache() {
            if (_cacheReady) return true;
            try {
                const keys = await idbKeys();
                if (keys && keys.length > 0) {
                    for (const k of keys) {
                        const val = await idbGet(k);
                        if (val !== undefined) _cache[k] = val;
                    }
                    console.log('✅ 缓存已加载，共 ' + keys.length + ' 项');
                } else {
                    console.log('ℹ️ IndexedDB 为空，将使用默认数据');
                }
                _cacheReady = true;
                return true;
            } catch (e) {
                console.warn('⚠️ 缓存加载失败:', e);
                _cacheReady = true;
                return false;
            }
        }

        function loadData(key, def) {
            if (_cacheReady && _cache[key] !== undefined) {
                return _cache[key];
            }
            if (!_cacheReady) {
                return undefined;
            }
            return def;
        }

        function saveData(key, val) {
            _cache[key] = val;
            idbSet(key, val).catch(() => {});
            // 同时写入 localStorage 作为冗余备份
            try {
                localStorage.setItem('backup_' + key, JSON.stringify(val));
            } catch (e) {}
        }

        // ---- 迁移旧数据 ----
        async function migrateFromLocalStorage() {
            try {
                const migrated = localStorage.getItem('_migrated_to_idb_final');
                if (migrated) return;
                const keys = Object.keys(localStorage);
                let count = 0;
                for (const k of keys) {
                    if (k.startsWith('tarot_') || k.startsWith('app_')) {
                        const val = localStorage.getItem(k);
                        if (val) {
                            try { const parsed = JSON.parse(val); await idbSet(k, parsed);
                                _cache[k] = parsed; } catch (e) { await idbSet(k, val);
                                _cache[k] = val; }
                            count++;
                        }
                    }
                }
                localStorage.setItem('_migrated_to_idb_final', 'true');
                console.log('迁移完成，共迁移 ' + count + ' 项');
            } catch (e) {
                localStorage.setItem('_migrated_to_idb_final', 'true');
            }
        }

        function buildFullDeck() {
            const deck = [];
            TAROT.major.forEach(c => { deck.push({ ...c, type: 'major', suit: '大阿尔卡纳' }); });
            for (const [key, group] of Object.entries(TAROT.minor)) {
                group.cards.forEach(c => { deck.push({ ...c, type: 'minor', suit: group.suit }); });
            }
            return deck;
        }
        const FULL_DECK = buildFullDeck();

        function getReverseMeaning(card) {
            if (card.reverse) return card.reverse;
            const m = card.meaning || '';
            const prefixes = ['过度', '不足', '阻碍', '扭曲', '失衡的'];
            return prefixes[Math.floor(Math.random() * prefixes.length)] + m.slice(0, 12) + '...';
        }

        function drawCard(deck) {
            const shuffled = [...deck];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return { card: shuffled[0], isUpright: Math.random() < 0.5 };
        }

        function getCustomReply() {
            const cards = loadData(STORAGE.CARDS, []);
            if (!cards.length) return null;
            return cards[Math.floor(Math.random() * cards.length)].content;
        }

        function generateTarotReply(question) {
            const custom = getCustomReply();
            if (custom) return { fullText: custom, cardName: '自定义', orientation: '' };
            const { card, isUpright } = drawCard(FULL_DECK);
            const meaning = isUpright ? card.meaning : getReverseMeaning(card);
            const orientation = isUpright ? '正位' : '逆位';
            let prefix = '🌟 ';
            if (question.includes('感情') || question.includes('爱情')) prefix = '💕 ';
            else if (question.includes('事业') || question.includes('工作')) prefix = '💼 ';
            else if (question.includes('健康')) prefix = '🌿 ';
            else if (question.includes('财运')) prefix = '💰 ';
            let fullText = `${prefix}「${card.name}」${orientation}\n${meaning}`;
            const extra = ['✨ 信任你的直觉，宇宙自有安排。', '🌙 此刻的静默，是下一个回响的前奏。', '🌞 光与影交织，方见真相。', '🌸 一切发生，皆为助缘。',
                '🌀 允许变化流动，不执不拒。', '🌟 你比想象中更强大。'
            ];
            fullText += '\n\n' + extra[Math.floor(Math.random() * extra.length)];
            return { fullText, cardName: card.name, orientation };
        }

        // ---- 消息提示音 ----
        function playMessageSound() {
            if (!soundSetting || soundSetting.selected === 'off') return;
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                gain.gain.value = 0.15;
                if (soundSetting.selected === 'qq') {
                    osc.frequency.value = 1200;
                    osc.type = 'sine';
                    osc.start();
                    setTimeout(() => { osc.frequency.value = 1500; }, 80);
                    setTimeout(() => { osc.stop(); }, 180);
                } else if (soundSetting.selected === 'ding') {
                    osc.frequency.value = 800;
                    osc.type = 'sine';
                    osc.start();
                    setTimeout(() => { osc.frequency.value = 1000; }, 100);
                    setTimeout(() => { osc.stop(); }, 250);
                } else if (soundSetting.selected === 'chime') {
                    osc.frequency.value = 1800;
                    osc.type = 'sine';
                    osc.start();
                    setTimeout(() => { osc.frequency.value = 1600; }, 60);
                    setTimeout(() => { osc.frequency.value = 2000; }, 120);
                    setTimeout(() => { osc.stop(); }, 220);
                } else { osc.stop(); }
            } catch (e) {}
        }

            };
            session.messages.push(msg);

            }
            return msg;

            const sessionsData = loadData(STORAGE.SESSIONS);
            if (!sessionsData || sessionsData.length === 0) {
                const newSession = {
                    id: Date.now(),
                    name: '默认',
                    messages: [],

                    otherName: '塔罗灵犀',

                    bgImage: '',
                    dailyStatus: generateDailyStatus(),
                    dailyStatusDate: getTodayKey(),
                    callBg: '',
                    eyeProtect: { enabled: false, opacity: 30 }
                };
                sessions = [newSession];
                activeSessionId = newSession.id;
                saveData(STORAGE.SESSIONS, sessions);
                saveData(STORAGE.ACTIVE_SESSION, activeSessionId);
                return newSession;
            }
            sessions = sessionsData;
            let session = sessions.find(s => s.id === activeSessionId);
            if (!session) {
                session = sessions[0];
                activeSessionId = session.id;
                saveData(STORAGE.ACTIVE_SESSION, activeSessionId);
            }
            updateSessionDailyStatus(session);
            // 恢复背景（从独立键或会话对象）
            const savedBg = loadData(STORAGE.SESSION_BG + '_' + session.id);
            if (savedBg) {
                session.bgImage = savedBg;
            } else if (session.bgImage) {
                // 如果会话对象中有，则同步到独立键
                saveData(STORAGE.SESSION_BG + '_' + session.id, session.bgImage);
            }
            if (!session.eyeProtect) session.eyeProtect = { enabled: false, opacity: 30 };
            if (!session.callBg) session.callBg = '';
            return session;
        }

        // ---- 自动回复 ----
        function autoReply(question) {
            const settings = chatSettings;
            const minSec = parseInt(settings.replyMinSec) || 1;
            const maxSec = parseInt(settings.replyMaxSec) || 5;
            const delay = Math.floor(Math.random() * (maxSec - minSec + 1) + minSec) * 1000;
            const continuous = settings.continuous || false;
            const maxCount = parseInt(settings.continuousCount) || 2;
            const combo = settings.combo || false;

            setTimeout(() => {
                let useEmoji = otherUseEmoji && emojiList.length > 0 && Math.random() < 0.4;
                if (useEmoji) {
                    const emoji = emojiList[Math.floor(Math.random() * emojiList.length)];
                    let senderName = null;
                    if (groupMode && groupMembersList.length > 0) {
                        const member = groupMembersList[Math.floor(Math.random() * groupMembersList.length)];
                        senderName = member.name;
                    }
                    sendMessage(emoji.url, 'other', null, senderName, 'image', 'emoji');
                    document.getElementById('otherStatus').textContent = getRandomOtherStatus();
                    return;
                }
                let replies = [];
                const currentCards = loadData(STORAGE.CARDS, []);
                if (combo && currentCards.length > 1) {
                    const shuffled = [...currentCards].sort(() => Math.random() - 0.5);
                    const count = Math.min(maxCount, shuffled.length);
                    for (let i = 0; i < count; i++) replies.push(shuffled[i].content);
                } else {
                    const reply = generateTarotReply(question);
                    replies.push(reply.fullText);
                }
                let sendCount = replies.length;
                if (continuous && sendCount > 1) sendCount = Math.floor(Math.random() * Math.min(maxCount, sendCount)) + 1;
                const selected = replies.slice(0, sendCount);
                selected.forEach((text, index) => {
                    setTimeout(() => {
                        let senderName = null;
                        if (groupMode && groupMembersList.length > 0) {
                            const member = groupMembersList[Math.floor(Math.random() * groupMembersList.length)];
                            senderName = member.name;
                        }
                        sendMessage(text, 'other', null, senderName);
                        document.getElementById('otherStatus').textContent = getRandomOtherStatus();
                    }, index * 1200);
                });
            }, delay);
        }

        // ---- 压缩图片 ----
        function compressImage(dataUrl, maxSizeKB, callback) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let width = img.width,
                    height = img.height;
                if (width > 600 || height > 600) {
                    const ratio = Math.min(600 / width, 600 / height);
                    width = Math.round(width * ratio);
                    height = Math.round(height * ratio);
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                let quality = 0.9,
                    result = dataUrl,
                    sizeKB = 9999;
                while (sizeKB > maxSizeKB && quality > 0.1) {
                    result = canvas.toDataURL('image/jpeg', quality);
                    const base64Len = result.length - result.indexOf(',') - 1;
                    sizeKB = Math.round(base64Len * 3 / 4 / 1024);
                    quality -= 0.1;
                }
                callback(result);
            };
            img.src = dataUrl;
        }

                    '空亡': '音信稀时，五行属土，颜色黄色，方位中央。临勾陈，凡谋事主三、六、九。有不吉、无结果、忧虑之含义。'
                };
                return `🔮 小六壬掌诀：${results[idx]}\n${meanings[results[idx]] || ''}`;
            } else if (input.length === 1) {
                const char = input;
                const dict = {
                    '一': '一心一意，专注当下。',
                    '二': '二元对立，选择与平衡。',
                    '三': '三生万物，生生不息。',

                    '火': '火性热烈，光明上进。',

                    '地': '地道坤顺，厚德载物。',
                    '人': '人和为贵，众志成城。',
                    '心': '心之所向，素履以往。',
                    '爱': '爱出者爱返，福往者福来。'

                if (dict[char]) return `📜 字解：「${char}」\n${dict[char]}`;
                else {
                    const strokes = ['横', '竖', '撇', '捺', '折'];

        function renderCalendar(year, month) {
            const title = `${year}年${month+1}月`;
            document.getElementById('calTitle').textContent = title;
            const tbody = document.getElementById('calBody');
            tbody.innerHTML = '';
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let html = '<tr>';
            for (let i = 0; i < firstDay; i++) html += '<td></td>';
            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const marked = periodMarks[dateKey] || false;
                html += `<td class="${marked ? 'marked' : ''}" data-date="${dateKey}">${d}</td>`;
                if ((firstDay + d) % 7 === 0) html += '</tr><tr>';
            }
            html += '</tr>';
            tbody.innerHTML = html;
            tbody.querySelectorAll('td[data-date]').forEach(td => {
                td.addEventListener('click', function() {
                    const date = this.dataset.date;
                    const parts = date.split('-').map(Number);
                    const clicked = new Date(parts[0], parts[1] - 1, parts[2]);
                    if (periodMarks[date]) {
                        delete periodMarks[date];
                    } else {
                        const days = periodDays || 7;
                        for (let i = 0; i < days; i++) {
                            const dt = new Date(clicked);
                            dt.setDate(dt.getDate() + i);
                            const key = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
                            periodMarks[key] = 'start';
                        }
                    }
                    saveData(STORAGE.PERIOD_MARKS, periodMarks);
                    renderCalendar(year, month);
                });
            });
        }

        function markPeriodStart() {
            const today = new Date();
            const days = periodDays || 7;
            for (let i = 0; i < days; i++) {
                const dt = new Date(today);
                dt.setDate(dt.getDate() + i);
                const key = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
                periodMarks[key] = 'start';
            }
            saveData(STORAGE.PERIOD_MARKS, periodMarks);
            renderCalendar(currentYear, currentMonth);
            showToast(`已标记经期 ${days} 天`);
        }

            input.multiple = true;
            input.onchange = (e) => {
                const files = e.target.files;
                if (!files.length) return;
                let pending = files.length;
                let added = 0;
                for (const file of files) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const dataUrl = ev.target.result;
                        const name = file.name.replace(/\.[^/.]+$/, '');
                        const exists = musicList.some(m => m.name === name && m.data === dataUrl);
                        if (!exists) {
                            musicList.push({ name: name, artist: '本地', url: dataUrl, data: dataUrl });
                            added++;
                        }
                        pending--;
                        if (pending === 0) {
                            if (added > 0) {
                                saveData(STORAGE.MUSIC_LIST, musicList);
                                showToast(`成功添加 ${added} 首音乐`);
                                if (musicList.length === added) loadMusic(0);
                            } else {
                                showToast('没有新音乐可添加（可能已存在）');
                            }
                        }
                    };
                    reader.onerror = function() {
                        pending--;
                        if (pending === 0 && added === 0) showToast('读取文件失败');
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function playRingtone() {
            try {
                const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 800;
                osc.type = 'square';
                gain.gain.value = 0.15;
                osc.start();
                setTimeout(() => { osc.stop(); }, 400);
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.frequency.value = 1000;
                    osc2.type = 'square';
                    gain2.gain.value = 0.15;
                    osc2.start();
                    setTimeout(() => { osc2.stop(); }, 400);
                }, 500);
            } catch (e) {}
        }

            let hash = 0;
            for (let i = 0; i < card.name.length; i++) hash = (hash * 31 + card.name.charCodeAt(i)) % 1000;
            const base = 2 + (hash % 118);
            const offset = (Math.random() - 0.5) * 0.4 * base;
            return Math.round(Math.max(2, Math.min(120, base + offset)) * 60 * 1000);
        }

        function sendLetter(content) {
            const session = getCurrentSession();
            const newLetter = {
                id: Date.now() + Math.random(),
                direction: 'out',
                content: content,
                status: 'waiting',
                result: null,
                reply: null,
                time: new Date().toLocaleString(),
                sessionId: session.id
            };
            letters.push(newLetter);
            saveData(STORAGE.LETTERS, letters);
            showToast('✉️ 信件已寄出，等待回复...');
            scheduleLetterReply(newLetter, content);
            showLetterCenter();
        }

        function scheduleLetterReply(letter, content) {
            const baseMs = (expectReplyHours || 12) * 60 * 60 * 1000;
            const offset = (Math.random() - 0.5) * 2 * 60 * 60 * 1000;
            const delay = Math.max(1 * 60 * 60 * 1000, Math.min(24 * 60 * 60 * 1000, baseMs + offset));
            setTimeout(() => {
                const reading = generateTarotReply(content);
                let resultText = reading.fullText;
                for (let i = 1; i < Math.floor(Math.random() * 20) + 1; i++) {
                    resultText += '\n' + generateTarotReply(content + i).fullText;
                }
                const target = letters.find(l => l.id === letter.id);
                if (target) {
                    target.status = 'done';
                    target.result = resultText;
                    target.time = new Date().toLocaleString();
                    saveData(STORAGE.LETTERS, letters);
                    showToast('📩 收到回信！');
                    playMessageSound();
                    const modal = document.getElementById('commonModal');
                    if (modal.classList.contains('active')) {
                        showLetterCenter();
                    }
                }
            }, delay);
        }

                chatSettings.replyMaxSec = Math.min(10, Math.floor(val / 2) + 2);
                speedLabel.textContent = chatSettings.replyMinSec + '~' + chatSettings.replyMaxSec + 's';
                saveData(STORAGE.CHAT_SETTINGS, chatSettings);
            });

            // 复选框和输入框实时保存
            const controls = [
                { id: 'continuousReply', key: 'continuous', type: 'checkbox' },
                { id: 'continuousCount', key: 'continuousCount', type: 'number' },
                { id: 'comboReply', key: 'combo', type: 'checkbox' },
                { id: 'activeSendSwitch', key: 'enabled', type: 'checkbox', parent: 'activeSend' },
                { id: 'activeSendInterval', key: 'interval', type: 'number', parent: 'activeSend' },
                { id: 'activeLetterCount', key: 'count', type: 'number', parent: 'activeLetter' },
                { id: 'otherUseEmoji', key: 'otherUseEmoji', type: 'checkbox' },
                { id: 'expectReplyHours', key: 'expectReplyHours', type: 'select' },
                { id: 'periodDays', key: 'periodDays', type: 'number' },
                { id: 'eyeProtectSwitch', key: 'eyeProtectEnabled', type: 'checkbox' },
                { id: 'eyeProtectOpacity', key: 'eyeProtectOpacity', type: 'range' },
            ];

            controls.forEach(c => {
                const el = document.getElementById(c.id);
                if (!el) return;
                const event = c.type === 'range' ? 'input' : 'change';
                el.addEventListener(event, function() {
                    let value;
                    if (c.type === 'checkbox') value = this.checked;
                    else if (c.type === 'number' || c.type === 'range') value = parseFloat(this.value) || 0;
                    else if (c.type === 'select') value = this.value;
                    else value = this.value;

                    if (c.parent === 'activeSend') {
                        activeSend[c.key] = value;
                        saveData(STORAGE.ACTIVE_SEND, activeSend);

                        activeLetter[c.key] = value;
                        saveData(STORAGE.ACTIVE_LETTER, activeLetter);

                        otherUseEmoji = value;

                document.getElementById('musicOverlay').classList.add('active');
                musicList = loadData(STORAGE.MUSIC_LIST, []);
                if (!musicList.length) { musicTitle.textContent = '无音乐，请添加';
                    musicArtist.textContent = ''; } else {
                    if (musicIndex >= musicList.length) musicIndex = 0;
                    loadMusic(musicIndex);
                }
                updateMusicModeUI();
                if (isPlaying) {
                    musicPlayer.play().catch(function() {});
                    document.getElementById('musicPlayPause').textContent = '⏸️';
                }
            });

            document.getElementById('musicClose').addEventListener('click', function() {
                document.getElementById('musicOverlay').classList.remove('active');
                if (musicMinimized) {
                    musicMinimized = false;
                    saveData(STORAGE.MUSIC_MINIMIZED, false);
                    updateMusicMiniIndicator();
                }
                musicPlayer.pause();
                isPlaying = false;
                musicPlaying = false;
                saveData(STORAGE.MUSIC_PLAYING, false);
                document.getElementById('musicPlayPause').textContent = '▶️';
                updateMusicMiniIndicator();
            });

            document.getElementById('musicMinimize').addEventListener('click', toggleMusicMinimize);

            document.getElementById('musicMiniIndicator').addEventListener('click', function(e) {
                if (e.target.closest('.mmi-close')) return;
                if (musicMinimized) {
                    musicMinimized = false;
                    saveData(STORAGE.MUSIC_MINIMIZED, false);
                    updateMusicMiniIndicator();
                    document.getElementById('musicOverlay').classList.add('active');
                    if (isPlaying) {
                        musicPlayer.play().catch(function() {});
                        document.getElementById('musicPlayPause').textContent = '⏸️';
                    }
                }
            });

            document.getElementById('mmiClose').addEventListener('click', function(e) {
                e.stopPropagation();
                musicMinimized = false;
                saveData(STORAGE.MUSIC_MINIMIZED, false);
                updateMusicMiniIndicator();
                musicPlayer.pause();
                isPlaying = false;
                musicPlaying = false;
                saveData(STORAGE.MUSIC_PLAYING, false);
                document.getElementById('musicPlayPause').textContent = '▶️';
                showToast('音乐已关闭');
            });

            document.getElementById('musicPlayPause').addEventListener('click', function() {
                musicList = loadData(STORAGE.MUSIC_LIST, []);
                if (!musicList.length) { showToast('请先添加音乐'); return; }
                if (isPlaying) {
                    musicPlayer.pause();
                    isPlaying = false;
                    musicPlaying = false;
                    saveData(STORAGE.MUSIC_PLAYING, false);
                    document.getElementById('musicPlayPause').textContent = '▶️';
                } else {
                    // 恢复音频上下文
                    if (musicPlayer.src) {
                        musicPlayer.load();
                        musicPlayer.play().then(() => {
                            isPlaying = true;
                            musicPlaying = true;
                            saveData(STORAGE.MUSIC_PLAYING, true);
                            document.getElementById('musicPlayPause').textContent = '⏸️';
                        }).catch(() => {
                            showToast('播放失败，请重新选择音乐');
                        });
                    } else {
                        showToast('请先添加音乐');
                    }
                }
                updateMusicMiniIndicator();
            });

            document.getElementById('musicPrev').addEventListener('click', function() {
                musicList = loadData(STORAGE.MUSIC_LIST, []);
                if (!musicList.length) return;
                if (musicMode === 2) {
                    var newIdx = Math.floor(Math.random() * musicList.length);
                    while (musicList.length > 1 && newIdx === musicIndex) { newIdx = Math.floor(Math.random() *
                            musicList.length); }
                    loadMusic(newIdx);
                } else {
                    var prev = musicIndex - 1;
                    if (prev < 0) prev = musicList.length - 1;
                    loadMusic(prev);
                }
                if (isPlaying) musicPlayer.play().catch(() => {});
            });

            document.getElementById('musicNext').addEventListener('click', playNext);
            document.getElementById('musicModeBtn').addEventListener('click', toggleMusicMode);
            document.getElementById('musicAddBtn').addEventListener('click', addMusicFiles);

            document.getElementById('musicBgBtn').addEventListener('click', function() {
                var input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = function(e) {
                    var file = e.target.files[0];
                    if (file) {
                        var reader = new FileReader();
                        reader.onload = function(ev) {
                            document.getElementById('musicContainer').style.backgroundImage = 'url(' + ev.target
                                .result + ')';
                            document.getElementById('musicContainer').style.backgroundSize = 'cover';
                        };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
            });

            document.getElementById('musicListBtn').addEventListener('click', showMusicList);

            musicPlayer.addEventListener('ended', function() {
                if (musicMode === 1) { loadMusic(musicIndex); if (isPlaying) musicPlayer.play().catch(function() {}); } else
                    playNext();
            });

            musicPlayer.addEventListener('timeupdate', function() {
                if (musicPlayer.duration) {
                    musicCurrentTime = musicPlayer.currentTime;
                    saveData(STORAGE.MUSIC_CURRENT_TIME, musicCurrentTime);
                }
            });

            // 电话
            document.getElementById('phoneBtn').addEventListener('click', startCall);
            document.getElementById('callHangup').addEventListener('click', endCall);
            document.getElementById('callMinimizeBtn').addEventListener('click', minimizeCall);
            document.getElementById('miniHangup').addEventListener('click', endCall);
            document.getElementById('callMini').addEventListener('click', restoreCall);

            document.getElementById('callBgBtn').addEventListener('click', function(e) {
                e.stopPropagation();
                var input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = function(ev) {
                    var file = ev.target.files[0];
                    if (file) {
                        var reader = new FileReader();
                        reader.onload = function(re) {
                            compressImage(re.target.result, 150, function(compressed) {
                                var session = getCurrentSession();
                                session.callBg = compressed;
                                saveAll();
                                updateCallUI();
                                showToast('电话背景已更新（仅当前会话）');
                            });
                        };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
            });

            // 表情包（已修复）
            document.getElementById('emojiBtn').addEventListener('click', showEmojiPicker);
            document.getElementById('emojiBtn').addEventListener('dblclick', showEmojiManager);

            // 我的头像/昵称
            document.getElementById('myAvatar').addEventListener('click', function(e) {
                e.stopPropagation();
                var input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = function(e) {
                    var file = e.target.files[0];
                    if (file) {
                        var reader = new FileReader();
                        reader.onload = function(ev) {
                            compressImage(ev.target.result, 100, function(compressed) {
                                myAvatar = compressed;
                                myProfile.avatar = myAvatar;
                                saveData(STORAGE.MY_PROFILE, myProfile);
                                updateTopBar();
                                showToast('我的头像已更新');
                            });
                        };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
            });

            document.getElementById('myName').addEventListener('click', function(e) {
                e.stopPropagation();
                var newName = prompt('输入我的昵称：', myName);
                if (newName !== null && newName.trim()) {
                    myName = newName.trim();
                    myProfile.name = myName;
                    saveData(STORAGE.MY_PROFILE, myProfile);
                    updateTopBar();
                }
            });

            document.getElementById('otherName').addEventListener('click', function(e) {
                e.stopPropagation();
                var session = getCurrentSession();
                var newName = prompt('输入对方昵称：', session.otherName);
                if (newName !== null && newName.trim()) {
                    session.otherName = newName.trim();
                    saveAll();
                    updateTopBar();
                    renderSessionList();
                    updateCallUI();
                }
            });

            // 状态管理
            document.getElementById('otherStatus').addEventListener('click', function(e) {
                e.stopPropagation();
                var session = getCurrentSession();
                var list = getSessionStatusList(session.id);
                var sid = String(session.id);
                var enabled = statusSwitch[sid] || false;
                var interval = statusInterval[sid] || 30;
                var html = `
                    <div class="field"><label>当前状态列表（一行一个）</label>
                        <textarea id="statusListInput" style="min-height:120px;">${list.join('\n')}</textarea>
                    </div>
                    <div class="field">
                        <label>自动切换状态</label>
                        <div style="display:flex;gap:12px;align-items:center;">
                            <label><input type="checkbox" id="statusAutoSwitch" ${enabled ? 'checked' : ''}> 开启</label>
                            <label>间隔（秒）<input type="number" id="statusIntervalInput" value="${interval}" min="5" max="300" style="width:60px;"></label>
                        </div>
                    </div>
                    <div style="font-size:13px;color:#888;margin-top:4px;">💡 开启后，状态会自动在列表中随机切换</div>
                `;
                openModal('🎭 状态管理（当前会话）', html, '保存', '取消', function() {
                    var text = document.getElementById('statusListInput').value;
                    var newList = text.split('\n').map(function(s) { return s.trim(); }).filter(function(s) { return s
                            .length > 0; });
                    if (!newList.length) { showToast('至少保留一个状态'); return; }
                    sessionStatuses[sid] = newList;
                    var autoOn = document.getElementById('statusAutoSwitch').checked;
                    statusSwitch[sid] = autoOn;
                    var newInterval = parseInt(document.getElementById('statusIntervalInput').value) || 30;
                    statusInterval[sid] = Math.max(5, Math.min(300, newInterval));
                    saveAll();
                    document.getElementById('otherStatus').textContent = getRandomOtherStatus();
                    stopStatusAutoSwitch();
                    startStatusAutoSwitch();
                    showToast('状态已更新');
                });
            });

            // 关闭弹窗
            document.querySelectorAll('.modal-overlay').forEach(function(m) {
                m.addEventListener('click', function(e) {
                    if (e.target === this) this.classList.remove('active');
                });
            });

            // 高级设置
            document.getElementById('importBackupBtn').addEventListener('click', function() {
                var input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = function(e) {
                    var file = e.target.files[0];
                    if (!file) return;
                    var reader = new FileReader();
                    reader.onload = function(ev) {
                        try {
                            var data = JSON.parse(ev.target.result);
                            if (data.sessions) sessions = data.sessions;
                            if (data.activeSessionId) activeSessionId = data.activeSessionId;
                            if (data.customCards) customCards = data.customCards;
                            if (data.letters) letters = data.letters;
                            if (data.liuyaoHistory) liuyaoHistory = data.liuyaoHistory;
                            if (data.periodMarks) periodMarks = data.periodMarks;
                            if (data.musicList) musicList = data.musicList;
                            if (data.emojiList) emojiList = data.emojiList;
                            if (data.musicMode !== undefined) musicMode = data.musicMode;
                            if (data.drafts) drafts = data.drafts;
                            if (data.periodDays !== undefined) periodDays = data.periodDays;
                            if (data.activeSend) activeSend = data.activeSend;
                            if (data.activeLetter) activeLetter = data.activeLetter;
                            if (data.groupMode !== undefined) groupMode = data.groupMode;
                            if (data.groupMembers) groupMembersList = data.groupMembers;
                            if (data.sessionStatuses) sessionStatuses = data.sessionStatuses;
                            if (data.statusSwitch) statusSwitch = data.statusSwitch;
                            if (data.statusInterval) statusInterval = data.statusInterval;
                            if (data.colorTheme) colorTheme = data.colorTheme;
                            if (data.nightMode !== undefined) nightMode = data.nightMode;
                            if (data.myProfile) { myProfile = data.myProfile;
                                myName = myProfile.name;
                                myAvatar = myProfile.avatar; }
                            if (data.soundSetting) soundSetting = data.soundSetting;
                            if (data.expectReplyHours !== undefined) expectReplyHours = data.expectReplyHours;
                            if (data.otherUseEmoji !== undefined) otherUseEmoji = data.otherUseEmoji;
                            if (data.musicIndex !== undefined) musicIndex = data.musicIndex;
                            if (data.musicCurrentTime !== undefined) musicCurrentTime = data.musicCurrentTime;
                            if (data.musicMinimized !== undefined) musicMinimized = data.musicMinimized;
                            if (data.musicPlaying !== undefined) musicPlaying = data.musicPlaying;
                            saveAll();
                            renderMessages();
                            renderSessionList();
                            applySessionBg();
                            showToast('导入成功');
                        } catch (err) { showToast('导入失败，格式错误'); }
                    };
                    reader.readAsText(file);
                };
                input.click();
            });

            document.getElementById('exportBackupBtn').addEventListener('click', function() {
                var data = {
                    sessions: sessions,
                    activeSessionId: activeSessionId,
                    customCards: customCards,
                    letters: letters,
                    liuyaoHistory: liuyaoHistory,
                    periodMarks: periodMarks,
                    musicList: musicList,
                    emojiList: emojiList,
                    musicMode: musicMode,
                    drafts: drafts,
                    periodDays: periodDays,
                    activeSend: activeSend,
                    activeLetter: activeLetter,
                    groupMode: groupMode,
                    groupMembers: groupMembersList,
                    sessionStatuses: sessionStatuses,
                    statusSwitch: statusSwitch,
                    statusInterval: statusInterval,
                    colorTheme: colorTheme,
                    nightMode: nightMode,
                    myProfile: { name: myName, avatar: myAvatar },
                    soundSetting: soundSetting,
                    expectReplyHours: expectReplyHours,
                    otherUseEmoji: otherUseEmoji,
                    musicIndex: musicIndex,
                    musicCurrentTime: musicCurrentTime,
                    musicMinimized: musicMinimized,
                    musicPlaying: musicPlaying,
                    version: '2.0'
                };
                var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'tarot_backup_' + new Date().toISOString().slice(0, 10) + '.json';
                a.click();
                URL.revokeObjectURL(url);
                showToast('导出成功');
            });

            document.getElementById('memoryClearBtn').addEventListener('click', function() {
                var totalMessages = sessions.reduce(function(sum, s) { return sum + (s.messages || []).length; }, 0);
                var size = new Blob([JSON.stringify(sessions)]).size;
                var sizeKB = (size / 1024).toFixed(1);
                if (confirm('内存占用：' + sizeKB + ' KB，共 ' + totalMessages + ' 条消息。\n是否清除所有聊天记录？')) {
                    sessions.forEach(function(s) { s.messages = []; });
                    saveAll();
                    renderMessages();
                    showToast('已清除所有聊天记录');
                }
            });

            document.getElementById('changePasswordBtn').addEventListener('click', window.changeAppPassword);
            document.getElementById('disablePasswordBtn').addEventListener('click', window.disableAppPassword);

            document.getElementById('applyPeriodDays').addEventListener('click', function() {
                var val = parseInt(document.getElementById('periodDays').value) || 7;
                periodDays = val;
                saveData(STORAGE.PERIOD_DAYS, periodDays);
                showToast('经期延后天数已设为 ' + val + ' 天');
            });

            document.getElementById('changeOtherAvatarBtn').addEventListener('click', function() {
                var input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = function(e) {
                    var file = e.target.files[0];
                    if (file) {
                        var reader = new FileReader();
                        reader.onload = function(ev) {
                            compressImage(ev.target.result, 100, function(compressed) {
                                var session = getCurrentSession();
                                session.otherAvatar = compressed;
                                saveAll();
                                updateTopBar();
                                renderSessionList();
                                updateCallUI();
                                showToast('对方头像已更新（仅当前会话）');
                            });
                        };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
            });

            // 小六卦
            document.getElementById('liuyaoGetBtn').addEventListener('click', getLiuyaoResult);
            document.getElementById('clearLiuyaoHist').addEventListener('click', function() {
                if (confirm('清空所有历史记录？')) {
                    liuyaoHistory = [];
                    saveData(STORAGE.LIUYAO_HIST, liuyaoHistory);
                    renderLiuyaoHistory();
                    showToast('已清空');
                }
            });
            document.getElementById('liuyaoInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') getLiuyaoResult();
            });

            // 高级折叠
            document.getElementById('advancedToggle').addEventListener('click', function() {
                var content = document.getElementById('advancedContent');
                var isOpen = content.style.maxHeight !== '0px';
                content.style.maxHeight = isOpen ? '0' : '999px';
                this.textContent = isOpen ? '▼ 展开高级' : '▲ 收起高级';
            });

            // ---- 启动 ----
            updateTopBar();
            renderMessages();
            renderSessionList();
            applySessionBg();
            updateCallUI();
            startActiveSend();
            startActiveLetter();
            startStatusAutoSwitch();
            startAutoCall();

            var wisdomList = ['生活明朗，万物可爱。', '愿你眼中总有光芒，活成你想要的模样。', '温柔半两，从容一生。', '保持热爱，奔赴山海。',
                '知足且上进，温柔且坚定。', '一愿识尽世间好人，二愿读尽世间好书，三愿看尽世间好山水。', '日子滚烫，又暖又亮。', '心有山海，静而无边。'
            ];
            document.getElementById('dailyWisdom').textContent = '✨ 今日暖心文案：' + wisdomList[new Date().getDate() % wisdomList
            .length];

            var gm = loadData(STORAGE.GROUP_MODE, false);
            document.getElementById('groupModeSwitch').checked = gm;
            groupMode = gm;
            document.getElementById('groupMembersArea').style.display = gm ? 'block' : 'none';
            if (gm) {
                document.getElementById('groupMembersInput').value = groupMembersList.map(function(m) { return m.name + ',' +
                    m.avatar; }).join('\n');
            }

            // 恢复音乐播放
            if (musicList.length > 0) {
                if (musicIndex >= musicList.length) musicIndex = 0;
                loadMusic(musicIndex);
                if (musicPlaying || isPlaying) {
                    musicPlayer.play().catch(function() {});
                    isPlaying = true;
                    musicPlaying = true;
                    saveData(STORAGE.MUSIC_PLAYING, true);
                    document.getElementById('musicPlayPause').textContent = '⏸️';
                }
                if (musicMinimized) {
                    updateMusicMiniIndicator();
                }
            } else {
                updateMusicMiniIndicator();
            }

            if (!sessions.length) createSession('默认');
            showToast('✨ 欢迎回来');
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (document.getElementById('lockOverlay').classList.contains('hidden')) {
                initApp();
            }
        });
    </script>
</body>
  </html>
